<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login</title>
</head>
<body>

<input type="password" id="password" placeholder="Password">
<button onclick="login()">Masuk</button>

<script>
function login() {
    if (document.getElementById("password").value === "PASSWORDANDA") {
        document.cookie = "auth=ok; path=/";
        window.location.href = "/";
    } else {
        alert("Password salah");
    }
}
</script>

</body>
</html>
